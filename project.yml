name: AGentleMan
options:
  bundleIdPrefix: com.agentleman
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en

settings:
  MARKETING_VERSION: "0.1.0"
  CURRENT_PROJECT_VERSION: 1
  SWIFT_VERSION: "6.2"
  SWIFT_STRICT_CONCURRENCY: complete
  ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.13.0

targets:
  AGentleMan:
    type: application
    platform: macOS
    sources:
      - path: Sources/AGentleMan
      - path: Resources/Assets.xcassets
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.agentleman.app
      INFOPLIST_FILE: Resources/Info.plist
      CODE_SIGN_ENTITLEMENTS: Resources/AGentleMan.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_HARDENED_RUNTIME: true
      CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: Resources/AGentleMan.entitlements
      properties:
        com.apple.security.network.client: true
    dependencies:
      - package: SwiftTerm
    scheme:
      testTargets:
        - AGentleManTests
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint &> /dev/null; then
            swiftlint --fix && swiftlint
          else
            echo "warning: SwiftLint not installed, install via 'brew install swiftlint'"
          fi
      - name: SwiftFormat
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftformat &> /dev/null; then
            swiftformat . --lint
          else
            echo "warning: SwiftFormat not installed, install via 'brew install swiftformat'"
          fi
  AGentleManTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AGentleManTests
    settings:
      GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: AGentleMan
